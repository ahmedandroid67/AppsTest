<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoTest Engine | Ultra-Performance Testing</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --error: #ef4444;
            --success: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* 🌌 Dynamic Background Elements */
        body::before, body::after {
            content: '';
            position: absolute;
            width: 50vw;
            height: 50vw;
            border-radius: 50%;
            filter: blur(150px);
            z-index: -1;
            opacity: 0.15;
            animation: pulse 15s infinite alternate;
        }

        body::before {
            background: var(--primary);
            top: -10%;
            left: -10%;
        }

        body::after {
            background: #8b5cf6;
            bottom: -10%;
            right: -10%;
            animation-delay: -7s;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.1; }
            100% { transform: scale(1.2); opacity: 0.2; }
        }

        /* ✨ Glassmorphism Card */
        .container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: translateY(0);
            transition: all 0.3s ease;
        }

        .container:hover {
            border-color: rgba(99, 102, 241, 0.3);
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.1);
        }

        header {
            text-align: center;
            margin-bottom: 32px;
        }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        p.subtitle {
            color: var(--text-dim);
            font-size: 0.95rem;
        }

        .input-group {
            margin-bottom: 20px;
            position: relative;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-dim);
            margin-bottom: 8px;
            margin-left: 4px;
        }

        input {
            width: 100%;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px 16px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s ease;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
            background: rgba(15, 23, 42, 0.8);
        }

        button {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none !important;
        }

        #status {
            text-align: center;
            margin-top: 24px;
            font-size: 0.9rem;
            font-weight: 500;
            min-height: 20px;
            transition: all 0.3s ease;
        }

        .status-running { color: var(--primary); }
        .status-success { color: var(--success); }
        .status-error { color: var(--error); }

        /* 🌀 Loading Spinner */
        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 244, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* 📊 Reports Link */
        .footer-links {
            margin-top: 32px;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            padding-top: 24px;
        }

        .footer-links a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 0.85rem;
            transition: color 0.2s ease;
        }

        .footer-links a:hover {
            color: var(--primary);
        }

    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>🚀 AutoTest Engine</h1>
            <p class="subtitle">Automated Web Exploration & Analysis</p>
        </header>

        <div class="input-group">
            <label for="url">TARGET APPLICATION URL</label>
            <input id="url" type="url" placeholder="https://example.com" value="https://medisys.laaraichi.com/">
        </div>

        <div class="input-group">
            <label for="email">ADMIN EMAIL</label>
            <input id="email" type="email" placeholder="admin@company.com" value="medecin@gmail.com">
        </div>

        <div class="input-group">
            <label for="password">ACCESS PASSWORD</label>
            <input id="password" type="password" placeholder="••••••••" value="admin123">
        </div>

        <button id="start-btn" onclick="startTest()">
            <div id="spinner" class="spinner"></div>
            <span id="btn-text">INITIALIZE ENGINE</span>
        </button>

        <p id="status"></p>

        <div class="footer-links">
            <a href="/reports/report.html" target="_blank">View Latest Analysis Report →</a>
        </div>
    </div>

    <script>
        async function startTest() {
            const btn = document.getElementById('start-btn');
            const spinner = document.getElementById('spinner');
            const btnText = document.getElementById('btn-text');
            const status = document.getElementById('status');

            // ⚡ UI State: Loading
            btn.disabled = true;
            spinner.style.display = 'block';
            btnText.innerText = 'ENGINE RUNNING...';
            status.innerText = "Connecting to automation server...";
            status.className = 'status-running';

            try {
                const response = await fetch('http://localhost:3000/run', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        url: document.getElementById('url').value,
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });

                if (response.ok) {
                    status.innerText = "🚀 Engine started successfully! Check console for real-time logs.";
                    status.className = 'status-success';
                } else {
                    throw new Error("Server rejected the request.");
                }
            } catch (err) {
                status.innerText = "❌ Connection failed: " + err.message;
                status.className = 'status-error';
            } finally {
                // Return to ready state after some time or immediately
                setTimeout(() => {
                    btn.disabled = false;
                    spinner.style.display = 'none';
                    btnText.innerText = 'START NEW SESSION';
                }, 3000);
            }
        }
    </script>

</body>
</html>
