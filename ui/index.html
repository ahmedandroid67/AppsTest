<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoTest Engine | Ultra-Performance Testing</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-dim: #94a3b8;
            --error: #ef4444;
            --success: #10b981;
            --sidebar-bg: rgba(15, 23, 42, 0.95);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* 🌌 Dynamic Background Elements */
        body::before,
        body::after {
            content: '';
            position: absolute;
            width: 50vw;
            height: 50vw;
            border-radius: 50%;
            filter: blur(150px);
            z-index: -1;
            opacity: 0.15;
            animation: pulse 15s infinite alternate;
        }

        body::before { background: var(--primary); top: -10%; left: -10%; }
        body::after { background: #8b5cf6; bottom: -10%; right: -10%; animation-delay: -7s; }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.1; }
            100% { transform: scale(1.2); opacity: 0.2; }
        }

        /* ✨ Glassmorphism Card */
        .container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: translateY(0);
            transition: all 0.3s ease;
            display: none;
            z-index: 10;
        }

        .container.active { display: block; animation: fadeIn 0.5s ease forwards; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header { text-align: center; margin-bottom: 32px; }

        h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        p.subtitle { color: var(--text-dim); font-size: 0.95rem; }

        .input-group { margin-bottom: 20px; position: relative; }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-dim);
            margin-bottom: 8px;
            margin-left: 4px;
        }

        input {
            width: 100%;
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 12px 16px;
            color: white;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s ease;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
            background: rgba(15, 23, 42, 0.8);
        }

        button {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.4);
        }

        button:disabled { opacity: 0.7; cursor: not-allowed; transform: none !important; }

        #status, #login-status {
            text-align: center;
            margin-top: 24px;
            font-size: 0.9rem;
            font-weight: 500;
            min-height: 20px;
        }

        .status-running { color: var(--primary); }
        .status-success { color: var(--success); }
        .status-error { color: var(--error); }

        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 244, 0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .footer-links { margin-top: 32px; text-align: center; border-top: 1px solid rgba(255, 255, 255, 0.05); padding-top: 24px; }
        .footer-links a { color: var(--text-dim); text-decoration: none; font-size: 0.85rem; transition: color 0.2s ease; }
        .footer-links a:hover { color: var(--primary); }

        .logout-btn { width: auto; min-width: 100px; padding: 8px 16px; margin-top: 0; background: rgba(239, 68, 68, 0.1); color: var(--error); border: 1px solid rgba(239, 68, 68, 0.2); font-size: 0.8rem; }

        /* 📟 Live Terminal */
        .terminal-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 400px;
            height: 250px;
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            display: none;
            flex-direction: column;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            z-index: 100;
        }

        .terminal-header {
            padding: 8px 12px;
            background: rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.7rem;
            font-weight: 800;
            color: var(--text-dim);
            letter-spacing: 1px;
        }

        .terminal-body {
            flex: 1;
            padding: 12px;
            overflow-y: auto;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: #3ddc84;
            line-height: 1.4;
        }

        .terminal-body div { padding-bottom: 4px; }

        /* 📜 History Sidebar */
        .history-sidebar {
            position: fixed;
            left: 0;
            top: 0;
            bottom: 0;
            width: 260px;
            background: var(--sidebar-bg);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 24px;
            display: none;
            flex-direction: column;
            z-index: 50;
            animation: slideIn 0.4s ease;
        }

        @keyframes slideIn { from { transform: translateX(-100%); } to { transform: translateX(0); } }

        .history-sidebar h3 { font-size: 0.8rem; font-weight: 800; color: var(--text-dim); margin-bottom: 24px; letter-spacing: 1px; }

        .job-item {
            padding: 12px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.03);
            margin-bottom: 12px;
            border: 1px solid transparent;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }

        .job-item:hover { background: rgba(255, 255, 255, 0.07); border-color: var(--primary); }

        .delete-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(239, 68, 68, 0.1);
            color: var(--error);
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 6px;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: all 0.2s;
            z-index: 5;
            padding: 0;
            margin: 0;
        }

        .job-item:hover .delete-btn { opacity: 1; }
        .delete-btn:hover { background: var(--error); color: white; transform: scale(1.1); }

        .job-timestamp { font-size: 0.65rem; color: var(--text-dim); margin-bottom: 4px; }
        .job-id { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; font-weight: 600; color: #fff; }

    </style>
</head>

<body>

    <!-- 📜 History Sidebar -->
    <div id="history-sidebar" class="history-sidebar">
        <h3>HISTORICAL ANALYSIS</h3>
        <div id="jobs-list">
            <!-- Jobs will be loaded here -->
        </div>
    </div>

    <!-- 🔐 Login Screen -->
    <div id="login-screen" class="container">
        <header>
            <h1>🔐 Engine Access</h1>
            <p class="subtitle">Please sign in to continue</p>
        </header>
        <div class="input-group">
            <label for="admin-user">USERNAME</label>
            <input id="admin-user" type="text" placeholder="admin">
        </div>
        <div class="input-group">
            <label for="admin-pass">PASSWORD</label>
            <input id="admin-pass" type="password" placeholder="••••••••">
        </div>
        <button id="login-btn" onclick="login()">
            <div id="login-spinner" class="spinner"></div>
            <span id="login-text">SIGN IN</span>
        </button>
        <p id="login-status"></p>
    </div>

    <!-- 🚀 Main Dashboard -->
    <div id="main-dashboard" class="container">
        <header>
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                <h1 style="margin-bottom: 0;">🚀 Engine</h1>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
            <p class="subtitle">Automated Web Exploration & Analysis</p>
        </header>

        <div class="input-group">
            <label for="url">TARGET APPLICATION URL</label>
            <input id="url" type="url" placeholder="https://example.com" value="">
        </div>
        <div class="input-group">
            <label for="admin-email">ADMIN EMAIL</label>
            <input id="admin-email" type="email" placeholder="admin@company.com" value="">
        </div>
        <div class="input-group">
            <label for="admin-password">ACCESS PASSWORD</label>
            <input id="admin-password" type="password" placeholder="••••••••" value="">
        </div>

        <button id="start-btn" onclick="startTest()">
            <div id="spinner" class="spinner"></div>
            <span id="btn-text">INITIALIZE ENGINE</span>
        </button>

        <p id="status"></p>

        <div class="footer-links">
            <a href="/reports/report.html" target="_blank">View Current Report →</a>
        </div>
    </div>

    <!-- 📟 Live Terminal -->
    <div id="terminal-container" class="terminal-container">
        <div class="terminal-header">
            <span>DIAGNOSTIC LOGS</span>
            <span id="terminal-job-id">IDLE</span>
        </div>
        <div id="terminal-body" class="terminal-body">
            <div>> Waiting for engine start...</div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const terminal = document.getElementById('terminal-body');
        const terminalId = document.getElementById('terminal-job-id');

        socket.on('engine-log', (log) => {
            const div = document.createElement('div');
            div.innerText = `> ${log}`;
            terminal.appendChild(div);
            terminal.scrollTop = terminal.scrollHeight;
        });

        socket.on('engine-status', (data) => {
            syncUI(data);
        });

        function syncUI(data) {
            const btn = document.getElementById('start-btn');
            const spinner = document.getElementById('spinner');
            const btnText = document.getElementById('btn-text');
            const status = document.getElementById('status');

            if (data.status === 'running') {
                btn.disabled = true;
                spinner.style.display = 'block';
                btnText.innerText = 'ENGINE RUNNING...';
                status.innerText = "Automation in progress...";
                status.className = 'status-running';
                document.getElementById('terminal-container').style.display = 'flex';
                terminalId.innerText = data.jobId;
            } else if (data.status === 'completed') {
                btn.disabled = false;
                spinner.style.display = 'none';
                btnText.innerText = 'START NEW SESSION';
                status.innerHTML = `📊 Report saved: <strong>${data.jobId}</strong><br>✅ Test completed successfully!`;
                status.className = 'status-success';
                terminalId.innerText = 'FINISHED';
                loadJobs();
            } else if (data.status === 'error') {
                btn.disabled = false;
                spinner.style.display = 'none';
                btnText.innerText = 'START NEW SESSION';
                status.innerText = "❌ Test failed: " + (data.error || "Unknown error");
                status.className = 'status-error';
            }
        }

        // 🛡️ Auth Logic
        async function checkAuth() {
            try {
                const response = await fetch('/api/auth-check');
                const data = await response.json();
                if (data.authenticated) { 
                    showDashboard(); 
                    loadJobs();
                    checkCurrentStatus();
                }
                else { showLogin(); }
            } catch (err) { showLogin(); }
        }

        async function checkCurrentStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                syncUI(data);
            } catch (err) {}
        }

        function showLogin() {
            document.getElementById('login-screen').classList.add('active');
            document.getElementById('main-dashboard').classList.remove('active');
            document.getElementById('history-sidebar').style.display = 'none';
        }

        function showDashboard() {
            document.getElementById('login-screen').classList.remove('active');
            document.getElementById('main-dashboard').classList.add('active');
            document.getElementById('history-sidebar').style.display = 'flex';
        }

        async function login() {
            const user = document.getElementById('admin-user').value;
            const pass = document.getElementById('admin-pass').value;
            const status = document.getElementById('login-status');
            const btn = document.getElementById('login-btn');

            if (!user || !pass) { status.innerText = "Fields required."; status.className = 'status-error'; return; }

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: user, password: pass })
                });
                if (response.ok) { 
                    showDashboard(); 
                    loadJobs();
                    checkCurrentStatus();
                }
                else { status.innerText = "Invalid credentials."; status.className = 'status-error'; }
            } catch (err) { status.innerText = "Connection error."; status.className = 'status-error'; }
        }

        async function logout() { await fetch('/api/logout', { method: 'POST' }); window.location.reload(); }

        // 📜 History Logic
        async function loadJobs() {
            try {
                const res = await fetch('/api/jobs');
                if (!res.ok) return;
                const jobs = await res.json();
                const list = document.getElementById('jobs-list');
                list.innerHTML = jobs.length ? '' : '<div style="font-size: 0.7rem; color: var(--text-dim);">No history yet.</div>';
                
                jobs.forEach(job => {
                    const div = document.createElement('div');
                    div.className = 'job-item';
                    div.onclick = () => window.open(`/reports/report.html?job=${job.id}`, '_blank');
                    
                    let timestamp, siteName;
                    if (job.id.startsWith('job-')) {
                        timestamp = job.id.replace('job-', '');
                        siteName = 'Legacy Job';
                    } else {
                        const parts = job.id.split('-');
                        timestamp = parts[0];
                        siteName = parts.slice(1).join('-');
                    }

                    const timeStr = new Date(parseInt(timestamp)).toLocaleString();
                    div.innerHTML = `
                        <button class="delete-btn" onclick="deleteJob('${job.id}', event)" title="Delete Report">×</button>
                        <div class="job-timestamp">${timeStr}</div>
                        <div class="job-id" style="color: var(--primary); font-size: 0.85rem; margin-bottom: 2px;">${siteName}</div>
                        <div style="font-size: 0.6rem; color: var(--text-dim); opacity: 0.7;">${job.pageCount} pages · ${job.id}</div>
                    `;
                    list.appendChild(div);
                });
            } catch(e) {}
        }

        async function deleteJob(id, event) {
            event.stopPropagation(); // ✋ Don't open the report!
            if (!confirm(`Are you sure you want to delete the report for ${id}?\nThis will permanently remove all screenshots and data.`)) return;

            try {
                const res = await fetch(`/api/jobs/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    loadJobs();
                } else {
                    const data = await res.json();
                    alert("Delete failed: " + data.error);
                }
            } catch (err) {
                alert("Connection error.");
            }
        }

        // 🚀 Engine Logic
        async function startTest() {
            const status = document.getElementById('status');

            try {
                const response = await fetch('/run', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        url: document.getElementById('url').value || 'https://medisys.laaraichi.com/',
                        email: document.getElementById('admin-email').value,
                        password: document.getElementById('admin-password').value
                    })
                });

                const data = await response.json();
                if (response.ok) {
                    status.innerText = "Enqueued job: " + data.jobId;
                    status.className = 'status-running';
                } else {
                    throw new Error(data.error || "Request failed.");
                }
            } catch (err) {
                status.innerText = "❌ Startup error: " + err.message;
                status.className = 'status-error';
            }
        }

        // Initialize
        checkAuth();
    </script>
</body>
</html>
